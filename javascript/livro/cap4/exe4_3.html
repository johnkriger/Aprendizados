<script>
    const bairro = prompt('Bairro de entrega: ')
    let taxaEntrega
    switch (bairro.toLowerCase()) {
        case 'centro':
            taxaEntrega = 5.00
            break
        case 'fragata':
        case 'três vendas':
            taxaEntrega = 7.00
            break
        case 'laranjal':
            taxaEntrega = 10.00
            break
        default:
            taxaEntrega = 8.00
            break
    }
    alert(`Taxa de entrega ${taxaEntrega.toFixed(2)}`)
</script>
